name: vide_grenier_recette

services:
  db:
    image: mysql:8.0
    container_name: vide_grenier_db_recette
    restart: always
    env_file: .env
    volumes:
      - db_recette_data:/var/lib/mysql
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: vide-grenier-app:recette
    container_name: vide_grenier_web_recette
    env_file: .env
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_recette_data:
