<VirtualHost *:80>
    # Le front controller de l'app est public/index.php : la racine web
    # doit pointer sur public/, pas sur la racine du projet.
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # Autorise public/.htaccess a definir ses propres regles
        # (RewriteEngine, RewriteRule) : sans ça le .htaccess est ignore.
        AllowOverride All

        # Apache 2.4+ : refuse l'acces par defaut, il faut l'autoriser explicitement.
        Require all granted
    </Directory>
</VirtualHost>
