services:
  db:
    image: mysql:8.0
    container_name: vide_grenier_db_dev
    restart: always
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: vide_grenier_web_dev
    env_file: .env
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
