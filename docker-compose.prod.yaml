# Environnement de production : tourne en parallele du dev (8080) et de la recette (8081).
# "name" isole ce stack dans son propre reseau Docker.
name: vide_grenier_prod

services:
  # 1. BASE DE DONNEES DE PRODUCTION — persistante via volume nomme dedie
  # Nom de service "db_dev" conserve : Config.php a DB_HOST = 'db_dev' en dur dans le code.
  db_dev:
    image: mysql:8.0
    container_name: vide_grenier_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vide_grenier
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    volumes:
      - db_prod_data:/var/lib/mysql
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql

  # 2. SERVEUR WEB + PHP (Apache + mod_php), image de DEPLOIEMENT :
  # le code de main est COPIE dans l'image au build (Dockerfile.deploy), pas de volume.
  web_dev:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    container_name: vide_grenier_web_prod
    ports:
      - "8083:80"
    depends_on:
      - db_dev

volumes:
  # Volume nomme dedie : les donnees MySQL survivent aux redemarrages et recreations
  # du conteneur. C'est ce qui rend la base "persistante" au sens du sujet.
  db_prod_data:
